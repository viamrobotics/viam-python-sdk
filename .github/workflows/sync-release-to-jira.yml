name: Sync Release to Jira

# Manual trigger - you run this from GitHub Actions UI when ready
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.42.0 or v0.42.0)"
        required: true
        type: string

# Read-only permissions by default
permissions:
  contents: read

jobs:
  sync-jira:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Jira sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          # Pass version via env var to prevent shell injection
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          python etc/sync_jira_release.py "$RELEASE_VERSION"
